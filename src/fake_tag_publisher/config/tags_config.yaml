# Конфигурация ArUco-маркеров на потолке
# Для каждой метки задаются координаты (x, y, z) и углы Эйлера (roll, pitch, yaw) в радианах
# Высота потолка: z = 2.5 м. Метки развернуты лицом в пол (roll = 3.14159)

tags:
  tag_1:
    x: 2.0
    y: 1.0
    z: 2.5
    roll: 3.1415926
    pitch: 0.0
    yaw: 0.0
  tag_2:
    x: -1.0
    y: 2.0
    z: 2.5
    roll: 3.1415926
    pitch: 0.0
    yaw: 0.0
  tag_3:
    x: -2.0
    y: -1.0
    z: 2.5
    roll: 3.1415926
    pitch: 0.0
    yaw: 0.0
